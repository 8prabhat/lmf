    atlas_kernel_sizes: [5, 17, 65]
    mesh_layers: 3
    draft_horizons: [2, 4, 8]
    draft_aux_stride: 4
    route_aux_weight: 0.005
    draft_aux_weight: 0.01
    program_aux_weight: 0.01
    verifier_aux_weight: 0.01
  trainer:
    name: mcpm
    lr: 3.0e-4
    warmup_steps: 500
    total_steps: 20000
