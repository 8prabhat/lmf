# Bounded Hybrid Gear (bounded local attention + scan-based Gear memory) local-MPS research program.
default_block: screen

base:
  seed: 20262100
  device: mps
  precision: bf16
  data:
    name: pure_gear_contiguous_lanes
    corpus_root: outputs/tokenizer/sentencepiece_bpe_prepared
    index_root: outputs/pure_parallel_gear/360_proxy/index
    tokenizer_name: sentencepiece_bpe_edu_subset_v1
    domains:
      - cosmopedia
      - fineweb_edu
      - open_web_math
      - pes2o
      - pg19
      - stack_exchange
      - wikipedia
  trainer:
    name: pure_parallel_gear_v3
    stateful: true
    tbptt_chunks: 2
    betas: [0.9, 0.95]
    weight_decay: 0.01
    schedule_mode: tokens
  model:
    name: pure_parallel_gear_v3
    num_banks: 4
    gears_per_bank: 8
    rotor_channels: 1
    cell_dim: 16
    bank_rank: 16
    scan_chunk_tokens: 128
    future_horizons: [4, 16, 64, 256]
    future_aux_weight: 0.10
    future_aux_decay_fraction: 0.80
    max_seq_len: 16384

screen:
  model:
    dim: 96
    layers: 2
  trainer:
    lr: 3.0e-3
    total_training_tokens: 200000
    warmup_tokens: 20000
  run:
    seeds: 3
    batch_size: 2
    seq_len: 512

confirmation:
  model:
    dim: 128
    layers: 3
  trainer:
    lr: 1.0e-3
    total_training_tokens: 1000000
    warmup_tokens: 100000
  run:
    seeds: 3
    batch_size: 2
    seq_len: 512

scale_3m:
  model:
    dim: 192
    layers: 4
  trainer:
    lr: 3.0e-4
    total_training_tokens: 60000000
    warmup_tokens: 6000000
  run:
    seeds: 5
    batch_size: 2
    seq_len: 1024

scale_15m:
  model:
    dim: 384
    layers: 6
  trainer:
    lr: 2.0e-4
    total_training_tokens: 300000000
    warmup_tokens: 30000000
  run:
    seeds: 3
    batch_size: 1
    seq_len: 2048
