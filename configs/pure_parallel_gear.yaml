# Frozen canonical Pure Parallel Gear research program.
default_block: proxy

base:
  seed: 20261000
  device: mps
  # Pure Gear forces FP32 parameters and execution on MPS. Declaring BF16 here
  # previously made the Transformer baseline BF16 while Gear stayed FP32.
  precision: fp32
  data:
    name: paired_document_manifest
    manifest_root: outputs/pure_parallel_gear/360_proxy/train_seed_20262000
    seed: 20261000
    wrap: true
  model:
    name: pure_parallel_gear
    num_banks: 4
    gears_per_bank: 8
    rotor_channels: 4
    predictor_gears: 4
    settling_rounds: 2
    max_sentence_tokens: 128
    intra_sentence_clutch_tokens: 32
    max_seq_len: 4096
    retention_floor: 0.94
    retention_ceiling: 0.9999
    rotor_radius_limit: 4.0
    gear_residual_floor: 0.05
    predictor_residual_floor: 0.20
    rotor_energy_weight: 1.0e-4
    omega_saturation_weight: 1.0e-4
    clutch_collapse_weight: 1.0e-5
  trainer:
    name: pure_parallel_gear
    betas: [0.9, 0.95]
    weight_decay: 0.01
    schedule_mode: tokens
    dynamics_lr_multiplier: 0.25
    dynamics_grad_clip: 0.25
    context_lengths: [128, 256, 512, 1024, 2048, 4096]
    context_fractions: [0.10, 0.15, 0.20, 0.20, 0.20, 0.15]

proxy:
  model:
    vocab_size: 4109
    dim: 96
    layers: 3
  trainer:
    lr: 3.0e-3
    total_training_tokens: 1000000
    warmup_tokens: 100000
  run:
    seeds: 5
    effective_tokens_per_update: 8192

scale_3m:
  model:
    vocab_size: 32781
    dim: 72
    layers: 3
  trainer:
    total_training_tokens: 60000000
    warmup_tokens: 6000000
  run:
    seeds: 5
    effective_tokens_per_update: 32768
    learning_rates: [3.0e-4, 1.0e-3, 3.0e-3]

scale_15m:
  model:
    vocab_size: 32781
    dim: 256
    layers: 6
  trainer:
    total_training_tokens: 300000000
    warmup_tokens: 30000000
  run:
    seeds: 3
    effective_tokens_per_update: 65536
    learning_rates: [1.0e-4, 3.0e-4, 1.0e-3]

scale_50m:
  model:
    vocab_size: 32781
    dim: 512
    layers: 8
  trainer:
    total_training_tokens: 1000000000
    warmup_tokens: 100000000
  run:
    seeds: 2
    effective_tokens_per_update: 131072
    learning_rates: [6.0e-5, 2.0e-4, 6.0e-4]
