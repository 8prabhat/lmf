# Iterative generative comparison:
#   1. Transformer on SentencePiece BPE: baseline.
#      - transformer_sentencepiece_smoke is the smallest pipeline check.
#      - transformer_sentencepiece_matched_smoke is parameter-matched to MECM.
#   2. MECM on SentencePiece BPE: architecture-only comparison.
#   3. MECM on MultiGear: tokenizer + architecture comparison.
#
# Prepare data first:
#   lmf pretokenize-edu-sentencepiece-bpe \
#     --source-root /path/to/edu_combined \
#     --output-root outputs/tokenizer/sentencepiece_bpe_prepared \
#     --tokenizer-name sentencepiece_bpe_edu_subset_v1 \
#     --vocab-size 4096 \
#     --fraction 0.10 \
#     --max-bpe-tokens-per-domain 200000
#
#   lmf pretokenize-edu-multigear \
#     --source-root /path/to/edu_combined \
#     --output-root outputs/tokenizer/multigear_prepared \
#     --tokenizer-name multigear_edu_subset_v1 \
#     --vocab-size 4096 \
#     --fraction 0.10 \
#     --max-bpe-tokens-per-domain 200000
#
#   lmf pretokenize-edu-multigear-prediction-aware \
#     --source-root /path/to/edu_combined \
#     --output-root outputs/tokenizer/multigear_prediction_aware_prepared \
#     --tokenizer-name multigear_prediction_aware_edu_subset_v1 \
#     --vocab-size 4096 \
#     --fraction 0.10 \
#     --max-bpe-tokens-per-domain 200000

default_block: transformer_sentencepiece_smoke

base:
  seed: 0
  device: auto
  precision: bf16
  data:
    name: edu_combined
    root: outputs/tokenizer/sentencepiece_bpe_prepared
    tokenizer_name: sentencepiece_bpe_edu_subset_v1
    sample_weights: tokens
    load_tokenizer: true
  run:
    batch_size: 2
    seq_len: 64
    steps: 20

transformer_sentencepiece_smoke:
  model:
    name: transformer
    dim: 128
    layers: 4
    heads: 4
    max_seq_len: 1024
    hierarchical_output: false
  trainer:
    name: transformer
    lr: 3.0e-4
    warmup_steps: 5
    total_steps: 20
    grad_accum_steps: 1

