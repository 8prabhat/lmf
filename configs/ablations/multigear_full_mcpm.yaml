# One-at-a-time ablation over the full MCPM research stack.

ablation:
  name: multigear_full_mcpm
  base_config: configs/multigear_baseline_models.yaml
  base_block: full_smoke_mcpm
  mode: one_at_a_time
  axes:
    - path: "structural:span_atlas.scales.skip[0]"
      values: [false, true]
      label: skip_short_span_atlas
    - path: "structural:active_cover.bypass"
      values: [false, true]
      label: bypass_active_cover
    - path: "structural:program_controller.bypass"
      values: [false, true]
      label: bypass_program_controller
    - path: "structural:execution_workbench.rounds.skip[0]"
      values: [false, true]
      label: skip_execution_round_0
    - path: "structural:contract_verifier.bypass"
      values: [false, true]
      label: bypass_contract_verifier
    - path: "loss_term:program_controller"
      values: [1.0, 0.0]
      label: program_aux_scale
    - path: "loss_term:contract_verifier"
      values: [1.0, 0.0]
      label: verifier_aux_scale
    - path: "loss_term:draft_tree"
      values: [1.0, 0.0]
      label: draft_aux_scale
  seeds: [0]
  run:
    steps: 30
    batch_size: 4
    seq_len: 64
  eval:
    n_batches: 3
    split: valid
  metric: bits_per_token
  goal: minimize

