# Longer MECM + MultiGear pilot ablation over the same pretokenized edu subset
# used by configs/multigear_generative_comparison.yaml.
#
# This is still a pilot, not a final benchmark. It is meant to catch obvious
# component bottlenecks after gates have begun to move away from zero.

ablation:
  name: mecm_multigear_pretok_pilot200
  base_config: configs/multigear_generative_comparison.yaml
  base_block: mecm_multigear_pilot200
  mode: one_at_a_time
  axes:
    - path: "structural:span_atlas.scales.skip[0]"
      values: [false, true]
      label: skip_short_span_atlas
    - path: "structural:span_atlas.scales.skip[2]"
      values: [false, true]
      label: skip_wide_span_atlas
    - path: "structural:active_cover.bypass"
      values: [false, true]
      label: bypass_active_cover
    - path: "structural:reasoning_mesh.layers.skip[0]"
      values: [false, true]
      label: skip_reasoning_mesh_0
    - path: "loss_term:route_balance"
      values: [1.0, 0.0]
      label: route_aux_scale
    - path: "loss_term:draft_tree"
      values: [1.0, 0.0]
      label: draft_aux_scale
  seeds: [0]
  run:
    steps: 200
    batch_size: 2
    seq_len: 64
  eval:
    n_batches: 5
    split: valid
  metric: bits_per_token
  goal: minimize
  results_dir: results/ablations/mecm_multigear_pretok_pilot200
