# Longer MRWT + MultiGear pilot ablation over the pretokenized edu subset.
# Same caution as MECM: this is a single-seed 200-step pilot, not a final
# benchmark. It is meant to expose obvious component bottlenecks.

ablation:
  name: mrwt_multigear_pretok_pilot200
  base_config: configs/generative_mecm_iteration.yaml
  base_block: mrwt_multigear_pilot200
  mode: one_at_a_time
  axes:
    - path: "structural:atlas.scales.skip[0]"
      values: [false, true]
      label: skip_short_atlas
    - path: "structural:atlas.scales.skip[2]"
      values: [false, true]
      label: skip_wide_atlas
    - path: "structural:budget_controller.bypass"
      values: [false, true]
      label: bypass_budget_controller
    - path: "structural:workbench_rounds.skip[0]"
      values: [false, true]
      label: skip_workbench_round_0
    - path: "structural:workbench_rounds.skip[1]"
      values: [false, true]
      label: skip_workbench_round_1
    - path: "loss_term:budget_controller"
      values: [1.0, 0.0]
      label: budget_aux_scale
    - path: "loss_term:draft_tree"
      values: [1.0, 0.0]
      label: draft_aux_scale
  seeds: [0]
  run:
    steps: 200
    batch_size: 2
    seq_len: 64
  eval:
    n_batches: 5
    split: valid
  metric: bits_per_token
  goal: minimize
  results_dir: results/ablations/mrwt_multigear_pretok_pilot200
